app = "symbol-games"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  SYMBOL_GAMES_ENVIRONMENT = "production"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
